# Anchor Platform — Mainnet
# Generated by scripts/setup-mainnet.mjs

version: 1

stellar_network:
  network: MAINNET
  horizon_url: https://horizon.stellar.org
  type: horizon

callback_api:
  base_url: http://business-server:3000
  auth:
    type: none

platform_api:
  auth:
    type: none

app_logging:
  level: INFO
  stellar_level: INFO

sep1:
  enabled: true
  toml:
    type: file
    value: /config/stellar.toml

sep10:
  enabled: true
  home_domains:
    - localhost:8080   # ← replace with your real domain in production

sep12:
  enabled: true

sep24:
  enabled: true
  interactive_url:
    base_url: http://localhost:3000/sep24/interactive
    jwt_expiration: 3600
  more_info_url:
    base_url: http://localhost:3000/sep24/transaction
    jwt_expiration: 3600

sep6:
  enabled: true
  features:
    account_creation: false
    claimable_balances: false
  more_info_url:
    base_url: http://localhost:3000/sep6/transaction
    jwt_expiration: 3600

sep31:
  enabled: true
  payment_type: STRICT_SEND

sep38:
  enabled: true
  sep10_enforced: false
  auth_enforced: false

data:
  type: postgres
  server: db:5432
  database: anchordb
  flyway_enabled: true
  ddl_auto: update

events:
  enabled: false

assets:
  type: yaml
  value: |
    items:
      - id: "stellar:ANCH:GDWMWXIY5MZ2GCKCGZHCNUW6R445ZNNI2D345EU4TCABPQY3JPFTGC27"
        distribution_account: "GBRVZOWUT6SOONWDEES74CSHTSK24JMSAYSA6BUOFFIULFOR2N72BIXY"
        significant_decimals: 2
        sep24:
          enabled: true
          deposit:
            enabled: true
            min_amount: 1
            max_amount: 1000000
            methods:
              - WIRE
          withdraw:
            enabled: true
            min_amount: 1
            max_amount: 1000000
            methods:
              - WIRE
